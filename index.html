<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>拡張版HTMLプレビューアー</title>
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="vendor/codemirror/lib/codemirror.css" />
    <!-- 依存はすべて vendor/ 同梱（オフライン動作。ADR-0001） -->
    <script defer src="vendor/feather-icons/dist/feather.min.js"></script>
    <script defer src="vendor/codemirror/lib/codemirror.js"></script>
    <script defer src="vendor/codemirror/mode/xml/xml.js"></script>
    <script defer src="vendor/codemirror/mode/javascript/javascript.js"></script>
    <script defer src="vendor/codemirror/mode/css/css.js"></script>
    <script defer src="vendor/codemirror/mode/htmlmixed/htmlmixed.js"></script>
    <script defer src="js/lib/core.js"></script>
    <script defer src="js/lib/storage.js"></script>
    <script defer src="js/lib/toast.js"></script>
    <script defer src="js/lib/keymap.js"></script>
    <script defer src="js/lib/editor.js"></script>
    <script defer src="js/lib/theme.js"></script>
    <script defer src="js/lib/layout.js"></script>
    <script defer src="js/lib/preview.js"></script>
    <script defer src="js/lib/file-io.js"></script>
    <script defer src="js/pages/index.js"></script>
  </head>
  <body>
    <div class="toolbar">
      <span class="toolbar-title">HTMLプレビューアー</span>
      <div class="toolbar-menu">
        <div class="btn-group" role="group" aria-label="編集操作">
          <button class="toolbar-button" id="undo-btn" title="元に戻す (Ctrl+Z)" aria-label="元に戻す">
            <i data-feather="rotate-ccw"></i>
          </button>
          <button class="toolbar-button" id="redo-btn" title="やり直す (Ctrl+Y)" aria-label="やり直す">
            <i data-feather="rotate-cw"></i>
          </button>
          <button class="toolbar-button" id="copy-btn" title="コードをクリップボードにコピー (Ctrl+Shift+C)" aria-label="エディター内容をコピー">
            <i data-feather="copy"></i>
          </button>
          <button class="toolbar-button" id="paste-btn" title="クリップボードから貼り付け (Ctrl+Shift+V)" aria-label="クリップボードから貼り付け">
            <i data-feather="clipboard"></i>
          </button>
          <button class="toolbar-button" id="clear-btn" title="エディターをクリア (Ctrl+Delete)" aria-label="エディター内容をクリア">
            <i data-feather="trash-2"></i>
          </button>
        </div>
        <div class="btn-group" role="group" aria-label="レイアウト切り替え">
          <button class="toolbar-button" id="layout-lr-btn" title="左右分割レイアウト (Ctrl+1)" aria-label="左右分割レイアウト">
            <i data-feather="columns"></i>
          </button>
          <button class="toolbar-button" id="layout-tb-btn" title="上下分割レイアウト (Ctrl+2)" aria-label="上下分割レイアウト">
            <i data-feather="minimize-2"></i>
          </button>
          <button class="toolbar-button" id="layout-po-btn" title="プレビューのみ (Ctrl+3)" aria-label="プレビューのみ表示">
            <i data-feather="eye"></i>
          </button>
          <button class="toolbar-button" id="theme-toggle-btn" title="テーマ切り替え" aria-label="テーマ切り替え">
            <i data-feather="moon"></i>
          </button>
          <button class="toolbar-button" id="help-btn" title="キーボードショートカット一覧 (?)" aria-label="キーボードショートカット一覧">
            <i data-feather="help-circle"></i>
          </button>
        </div>
        <div style="flex-grow: 1" aria-hidden="true"></div>
        <span class="save-status" id="save-status" role="status" aria-live="polite"></span>
        <div class="btn-group" role="group" aria-label="ファイル操作">
          <button class="toolbar-button" id="open-btn" title="HTMLファイルを開く" aria-label="HTMLファイルを開く">
            <i data-feather="upload"></i>
          </button>
          <input type="file" id="file-input" accept=".html,.htm,text/html" style="display: none" />
          <button class="toolbar-button" id="save-btn" title="HTMLファイルをダウンロード (Ctrl+S)" aria-label="HTMLファイルとして保存">
            <i data-feather="download"></i>
          </button>
        </div>
        <nav class="toolbar-nav" aria-label="ツール切り替え">
          <a href="index.html" class="nav-active">HTML</a>
          <a href="doceditor.html">DocEditor</a>
        </nav>
      </div>
    </div>

    <div class="split-view" id="split-view">
      <div class="editor-container" id="editor-container">
        <div class="panel-header">HTMLエディタ</div>
        <div class="editor-content-wrapper">
          <textarea
            id="html-editor"
            placeholder="HTMLコードをここに貼り付けてください..."
            wrap="soft"
            aria-label="HTMLコードエディター"
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
          ></textarea>
        </div>
      </div>
      <div class="gutter" id="gutter"></div>
      <div class="preview-panel" id="preview-panel">
        <div class="panel-header">プレビュー</div>
        <div class="panel-content">
          <iframe id="preview-container" aria-label="HTMLプレビュー表示エリア" title="HTMLコードのプレビュー結果"></iframe>
        </div>
      </div>
    </div>

    <div class="help-overlay" id="help-overlay" hidden role="dialog" aria-modal="true" aria-label="キーボードショートカット一覧">
      <div class="help-modal">
        <h2>キーボードショートカット</h2>
        <!-- 行は js/pages/index.js のキーマップ定義から生成される -->
        <table id="help-table"></table>
        <div class="help-modal-footer">Esc または外側クリックで閉じる</div>
      </div>
    </div>
  </body>
</html>
