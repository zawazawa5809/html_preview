name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # vendor/ が package.json の依存と乖離していないか（更新漏れ・手編集の検出）
      - name: Verify vendor/ is in sync
        run: |
          npm run vendor
          git diff --exit-code -- vendor/
