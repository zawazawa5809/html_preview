# main へのpushでGitHub Pagesへデプロイする（ADR-0001のオンライン配布）。
# 初回のみ: Settings → Pages → Source を「GitHub Actions」に設定すること。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # 実行時に必要なファイルだけを配信対象にする
      - name: Build site directory
        run: |
          mkdir -p _site
          cp index.html doceditor.html _site/
          cp -r styles js vendor _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
