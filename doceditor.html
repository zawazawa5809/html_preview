<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocEditor - ドキュメント修正エディタ</title>
    <link rel="stylesheet" href="styles/tokens.css" />
    <link rel="stylesheet" href="styles/common.css" />
    <link rel="stylesheet" href="styles/doceditor.css" />
    <link rel="stylesheet" href="vendor/codemirror/lib/codemirror.css" />
    <link rel="stylesheet" href="vendor/codemirror/addon/fold/foldgutter.css" />
    <link rel="stylesheet" href="vendor/codemirror/addon/dialog/dialog.css" />
    <!-- 依存はすべて vendor/ 同梱（オフライン動作。ADR-0001） -->
    <script defer src="vendor/feather-icons/dist/feather.min.js"></script>
    <script defer src="vendor/codemirror/lib/codemirror.js"></script>
    <script defer src="vendor/codemirror/mode/xml/xml.js"></script>
    <script defer src="vendor/codemirror/mode/javascript/javascript.js"></script>
    <script defer src="vendor/codemirror/mode/css/css.js"></script>
    <script defer src="vendor/codemirror/mode/htmlmixed/htmlmixed.js"></script>
    <script defer src="vendor/codemirror/addon/fold/foldcode.js"></script>
    <script defer src="vendor/codemirror/addon/fold/foldgutter.js"></script>
    <script defer src="vendor/codemirror/addon/fold/xml-fold.js"></script>
    <script defer src="vendor/codemirror/addon/fold/brace-fold.js"></script>
    <script defer src="vendor/codemirror/addon/dialog/dialog.js"></script>
    <script defer src="vendor/codemirror/addon/search/searchcursor.js"></script>
    <script defer src="vendor/codemirror/addon/search/search.js"></script>
    <script defer src="vendor/codemirror/addon/search/jump-to-line.js"></script>
    <script defer src="vendor/codemirror/addon/selection/active-line.js"></script>
    <script defer src="vendor/js-beautify/js/lib/beautify-html.js"></script>
    <script defer src="js/lib/core.js"></script>
    <script defer src="js/lib/storage.js"></script>
    <script defer src="js/lib/toast.js"></script>
    <script defer src="js/lib/keymap.js"></script>
    <script defer src="js/lib/modal.js"></script>
    <script defer src="js/lib/editor.js"></script>
    <script defer src="js/lib/theme.js"></script>
    <script defer src="js/lib/layout.js"></script>
    <script defer src="js/lib/preview.js"></script>
    <script defer src="js/lib/file-io.js"></script>
    <script defer src="js/pages/doceditor/design-mode.js"></script>
    <script defer src="js/pages/doceditor/design-panel.js"></script>
    <script defer src="js/pages/doceditor/outline.js"></script>
    <script defer src="js/pages/doceditor/main.js"></script>
  </head>
  <body>
    <div class="toolbar">
      <span class="toolbar-title">DocEditor - ドキュメント修正エディタ</span>
      <div class="toolbar-menu">
        <div class="btn-group" role="group" aria-label="編集操作">
          <button class="toolbar-button" id="undo-btn" title="元に戻す (Ctrl+Z)" aria-label="元に戻す">
            <i data-feather="rotate-ccw"></i>
          </button>
          <button class="toolbar-button" id="redo-btn" title="やり直す (Ctrl+Y)" aria-label="やり直す">
            <i data-feather="rotate-cw"></i>
          </button>
          <button class="toolbar-button" id="copy-btn" title="コードをクリップボードにコピー (Ctrl+Shift+C)" aria-label="コピー">
            <i data-feather="copy"></i>
          </button>
          <button class="toolbar-button" id="paste-btn" title="クリップボードから貼り付け (Ctrl+Shift+V)" aria-label="貼り付け">
            <i data-feather="clipboard"></i>
          </button>
          <button class="toolbar-button" id="clear-btn" title="エディターをクリア (Ctrl+Delete)" aria-label="クリア">
            <i data-feather="trash-2"></i>
          </button>
        </div>
        <div class="btn-group" role="group" aria-label="レイアウト切り替え">
          <button class="toolbar-button" id="layout-lr-btn" title="左右分割レイアウト (Ctrl+1)" aria-label="左右分割">
            <i data-feather="columns"></i>
          </button>
          <button class="toolbar-button" id="layout-tb-btn" title="上下分割レイアウト (Ctrl+2)" aria-label="上下分割">
            <i data-feather="minimize-2"></i>
          </button>
          <button class="toolbar-button" id="layout-po-btn" title="プレビューのみ (Ctrl+3)" aria-label="プレビューのみ">
            <i data-feather="eye"></i>
          </button>
          <button class="toolbar-button" id="theme-toggle-btn" title="テーマ切り替え" aria-label="テーマ切り替え">
            <i data-feather="moon"></i>
          </button>
          <button class="toolbar-button" id="help-btn" title="キーボードショートカット一覧 (?)" aria-label="キーボードショートカット一覧">
            <i data-feather="help-circle"></i>
          </button>
        </div>
        <div class="toolbar-separator"></div>
        <div class="btn-group" role="group" aria-label="デザインモード">
          <button class="toolbar-button" id="design-mode-btn" title="デザインモード (Ctrl+D)" aria-label="デザインモード切替">
            <i data-feather="edit-3"></i>
          </button>
        </div>
        <div class="btn-group" role="group" aria-label="印刷">
          <button class="toolbar-button" id="print-btn" title="印刷" aria-label="印刷">
            <i data-feather="printer"></i>
          </button>
        </div>
        <div style="flex-grow: 1" aria-hidden="true"></div>
        <span class="save-status" id="save-status" role="status" aria-live="polite"></span>
        <div class="btn-group" role="group" aria-label="ファイル操作">
          <button class="toolbar-button" id="open-btn" title="HTMLファイルを開く" aria-label="開く">
            <i data-feather="upload"></i>
          </button>
          <input type="file" id="file-input" accept=".html,.htm,text/html" style="display: none" />
          <button class="toolbar-button" id="save-btn" title="HTMLファイルをダウンロード (Ctrl+S)" aria-label="保存">
            <i data-feather="download"></i>
          </button>
        </div>
        <nav class="toolbar-nav" aria-label="ツール切り替え">
          <a href="index.html">HTML</a>
          <a href="doceditor.html" class="nav-active">DocEditor</a>
        </nav>
      </div>
    </div>

    <div class="split-view" id="split-view">
      <div class="editor-container" id="editor-container">
        <div class="panel-header panel-tabs">
          <button class="panel-tab active" id="tab-code" data-tab="code">Code</button>
          <button class="panel-tab" id="tab-design" data-tab="design">Design</button>
          <button class="panel-tab" id="tab-outline" data-tab="outline">Outline</button>
        </div>
        <div class="editor-content-wrapper" id="code-panel">
          <textarea
            id="html-editor"
            placeholder="HTMLコードをここに入力..."
            wrap="soft"
            aria-label="HTMLコードエディター"
            spellcheck="false"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
          ></textarea>
        </div>
      </div>
      <div class="gutter" id="gutter"></div>
      <div class="preview-panel" id="preview-panel">
        <div class="panel-header">Preview</div>

        <!-- Design toolbar（初期化時に editor-container 側へ移動される） -->
        <div id="design-toolbar" class="design-toolbar" style="display: none">
          <div class="dt-header">
            <span class="dt-element-tag" id="dt-element-tag">--</span>
            <div class="dt-actions" id="dt-actions" style="display: none">
              <button class="dt-btn" id="dt-move-up" title="上へ移動"><i data-feather="chevron-up"></i></button>
              <button class="dt-btn" id="dt-move-down" title="下へ移動"><i data-feather="chevron-down"></i></button>
              <button class="dt-btn" id="dt-duplicate" title="複製"><i data-feather="copy"></i></button>
              <button class="dt-btn" id="dt-delete" title="削除"><i data-feather="trash-2"></i></button>
              <button class="dt-btn" id="dt-copy-style" title="スタイルコピー"><i data-feather="droplet"></i></button>
              <button class="dt-btn" id="dt-paste-style" title="スタイル貼り付け"><i data-feather="clipboard"></i></button>
              <button class="dt-btn" id="dt-page-break" title="ページ区切り挿入"><i data-feather="scissors"></i></button>
              <div class="dt-add-wrap">
                <button class="dt-btn" id="dt-add-child" title="子要素追加" aria-haspopup="true" aria-expanded="false"><i data-feather="plus"></i></button>
                <div class="dt-add-dropdown" id="dt-add-dropdown" style="display: none">
                  <div class="dt-dropdown-category">Layout</div>
                  <button data-template="container">Container</button>
                  <button data-template="section">Section</button>
                  <button data-template="flex-row">Flex Row</button>
                  <button data-template="flex-col">Flex Column</button>
                  <button data-template="grid-2col">Grid (2col)</button>
                  <button data-template="divider">Divider</button>
                  <div class="dt-dropdown-category">Content</div>
                  <button data-template="heading">Heading</button>
                  <button data-template="text">Text Block</button>
                  <button data-template="list">List</button>
                  <div class="dt-dropdown-category">Media</div>
                  <button data-template="image">Image</button>
                  <div class="dt-dropdown-category">Interactive</div>
                  <button data-template="button">Button</button>
                  <button data-template="link">Link</button>
                  <div class="dt-dropdown-category">Print</div>
                  <button data-template="page-break">Page Break</button>
                </div>
              </div>
            </div>
          </div>
          <div class="dt-breadcrumb" id="dt-breadcrumb"></div>

          <div id="dt-hint" class="dt-hint">要素をクリックして選択</div>

          <div id="dt-controls" style="display: none">
            <!-- Colors -->
            <div class="dt-section-header" data-section="dt-colors" tabindex="0" role="button" aria-expanded="true" aria-controls="dt-colors">
              <span>Colors</span>
              <i data-feather="chevron-down" class="dt-chevron"></i>
            </div>
            <div class="dt-section-body" id="dt-colors">
              <div class="dt-color-row">
                <label>Background</label>
                <input type="color" id="dt-bg-color" value="#ffffff" />
                <input type="text" id="dt-bg-color-text" class="dt-input-sm" placeholder="#fff" />
                <button class="dt-transparent-btn" id="dt-bg-transparent" title="transparent">T</button>
              </div>
              <div class="dt-color-row">
                <label>Text</label>
                <input type="color" id="dt-text-color" value="#000000" />
                <input type="text" id="dt-text-color-text" class="dt-input-sm" placeholder="#000" />
              </div>
              <div class="dt-color-row">
                <label>Border</label>
                <input type="color" id="dt-border-color" value="#000000" />
                <input type="text" id="dt-border-color-text" class="dt-input-sm" placeholder="#000" />
              </div>
            </div>

            <!-- Typography -->
            <div class="dt-section-header collapsed" data-section="dt-typography" tabindex="0" role="button" aria-expanded="false" aria-controls="dt-typography">
              <span>Typography</span>
              <i data-feather="chevron-down" class="dt-chevron"></i>
            </div>
            <div class="dt-section-body collapsed" id="dt-typography">
              <div class="dt-row">
                <label>Font Size</label>
                <input type="range" id="dt-font-size-slider" min="8" max="72" value="16" />
                <input type="number" id="dt-font-size" class="dt-input-sm" min="1" max="200" value="16" />
                <span>px</span>
              </div>
              <div class="dt-row">
                <label>Weight</label>
                <select id="dt-font-weight" class="dt-select">
                  <option value="100">100</option>
                  <option value="200">200</option>
                  <option value="300">300</option>
                  <option value="400" selected>400</option>
                  <option value="500">500</option>
                  <option value="600">600</option>
                  <option value="700">700</option>
                  <option value="800">800</option>
                  <option value="900">900</option>
                </select>
              </div>
              <div class="dt-row">
                <label>Align</label>
                <div class="dt-btn-group" id="dt-text-align-group">
                  <button class="dt-btn-sm" data-align="left">L</button>
                  <button class="dt-btn-sm" data-align="center">C</button>
                  <button class="dt-btn-sm" data-align="right">R</button>
                  <button class="dt-btn-sm" data-align="justify">J</button>
                </div>
              </div>
              <div class="dt-row">
                <label>Line Height</label>
                <input type="range" id="dt-line-height-slider" min="0.5" max="3" step="0.1" value="1.5" />
                <input type="number" id="dt-line-height" class="dt-input-sm" min="0.5" max="5" step="0.1" value="1.5" />
              </div>
            </div>

            <!-- Spacing -->
            <div class="dt-section-header collapsed" data-section="dt-spacing" tabindex="0" role="button" aria-expanded="false" aria-controls="dt-spacing">
              <span>Spacing</span>
              <i data-feather="chevron-down" class="dt-chevron"></i>
            </div>
            <div class="dt-section-body collapsed" id="dt-spacing">
              <div class="dt-box-model">
                <div class="dt-box-margin">
                  <span class="dt-box-label">margin</span>
                  <input class="dt-box-input dt-box-top" id="dt-margin-top" value="0" data-prop="marginTop" />
                  <input class="dt-box-input dt-box-right" id="dt-margin-right" value="0" data-prop="marginRight" />
                  <input class="dt-box-input dt-box-bottom" id="dt-margin-bottom" value="0" data-prop="marginBottom" />
                  <input class="dt-box-input dt-box-left" id="dt-margin-left" value="0" data-prop="marginLeft" />
                  <div class="dt-box-padding">
                    <span class="dt-box-label">padding</span>
                    <input class="dt-box-input dt-box-top" id="dt-padding-top" value="0" data-prop="paddingTop" />
                    <input class="dt-box-input dt-box-right" id="dt-padding-right" value="0" data-prop="paddingRight" />
                    <input class="dt-box-input dt-box-bottom" id="dt-padding-bottom" value="0" data-prop="paddingBottom" />
                    <input class="dt-box-input dt-box-left" id="dt-padding-left" value="0" data-prop="paddingLeft" />
                    <div class="dt-box-content">content</div>
                  </div>
                </div>
              </div>
              <div class="dt-row dt-row-center">
                <button class="dt-link-btn" id="dt-padding-link" title="Padding一括変更">
                  <i data-feather="link"></i>
                  <span class="dt-btn-label">Pad</span>
                </button>
                <button class="dt-link-btn" id="dt-margin-link" title="Margin一括変更">
                  <i data-feather="link"></i>
                  <span class="dt-btn-label">Mar</span>
                </button>
              </div>
            </div>

            <!-- Box -->
            <div class="dt-section-header collapsed" data-section="dt-box" tabindex="0" role="button" aria-expanded="false" aria-controls="dt-box">
              <span>Box</span>
              <i data-feather="chevron-down" class="dt-chevron"></i>
            </div>
            <div class="dt-section-body collapsed" id="dt-box">
              <div class="dt-row">
                <label>Width</label>
                <input type="text" id="dt-width" class="dt-input" placeholder="auto" />
              </div>
              <div class="dt-row">
                <label>Height</label>
                <input type="text" id="dt-height" class="dt-input" placeholder="auto" />
              </div>
              <div class="dt-row">
                <label>Radius</label>
                <input type="range" id="dt-border-radius-slider" min="0" max="50" value="0" />
                <input type="number" id="dt-border-radius" class="dt-input-sm" min="0" max="999" value="0" />
                <span>px</span>
              </div>
              <div class="dt-row">
                <label>Opacity</label>
                <input type="range" id="dt-opacity-slider" min="0" max="1" step="0.05" value="1" />
                <span id="dt-opacity-value" class="dt-opacity-value">1</span>
              </div>
              <div class="dt-row">
                <label>Display</label>
                <select id="dt-display" class="dt-select">
                  <option value="block">block</option>
                  <option value="flex">flex</option>
                  <option value="grid">grid</option>
                  <option value="inline">inline</option>
                  <option value="inline-block">inline-block</option>
                  <option value="none">none</option>
                </select>
              </div>
              <div class="dt-row">
                <label>Overflow</label>
                <select id="dt-overflow" class="dt-select">
                  <option value="visible">visible</option>
                  <option value="hidden">hidden</option>
                  <option value="scroll">scroll</option>
                  <option value="auto">auto</option>
                </select>
              </div>
            </div>

            <!-- Table -->
            <div class="dt-section-header" data-section="dt-table" id="dt-table-header" style="display: none" tabindex="0" role="button" aria-expanded="true" aria-controls="dt-table">
              <span>Table</span>
              <i data-feather="chevron-down" class="dt-chevron"></i>
            </div>
            <div class="dt-section-body" id="dt-table" style="display: none">
              <div class="dt-row dt-row-wrap">
                <button class="dt-btn" id="dt-row-above" title="行を上に追加"><i data-feather="arrow-up"></i><span class="dt-btn-label">行</span></button>
                <button class="dt-btn" id="dt-row-below" title="行を下に追加"><i data-feather="arrow-down"></i><span class="dt-btn-label">行</span></button>
                <button class="dt-btn" id="dt-col-left" title="列を左に追加"><i data-feather="arrow-left"></i><span class="dt-btn-label">列</span></button>
                <button class="dt-btn" id="dt-col-right" title="列を右に追加"><i data-feather="arrow-right"></i><span class="dt-btn-label">列</span></button>
                <button class="dt-btn dt-btn-danger" id="dt-del-row" title="行を削除"><i data-feather="minus"></i><span class="dt-btn-label">行</span></button>
                <button class="dt-btn dt-btn-danger" id="dt-del-col" title="列を削除"><i data-feather="minus"></i><span class="dt-btn-label">列</span></button>
              </div>
            </div>
          </div>
        </div>

        <div id="outline-panel" class="design-toolbar" style="display: none">
          <div class="dt-header">
            <span class="dt-element-tag">Document Outline</span>
          </div>
          <div id="outline-list"></div>
          <div id="outline-empty" class="dt-hint">見出し要素がありません</div>
        </div>

        <div class="panel-content">
          <iframe id="preview-container" aria-label="HTMLプレビュー" title="HTMLコードのプレビュー結果"></iframe>
        </div>
      </div>
    </div>

    <div class="help-overlay" id="help-overlay" hidden role="dialog" aria-modal="true" aria-label="キーボードショートカット一覧">
      <div class="help-modal">
        <button class="help-close-btn" id="help-close-btn" aria-label="ヘルプを閉じる">✕</button>
        <h2>キーボードショートカット</h2>
        <!-- 行は js/pages/doceditor/main.js のキーマップ定義から生成される -->
        <table id="help-table"></table>
        <div class="help-modal-footer">Esc または外側クリックで閉じる</div>
      </div>
    </div>
  </body>
</html>
